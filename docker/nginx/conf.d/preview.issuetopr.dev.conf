server {
    listen 80;
    server_name ~^(?<preview>[a-z0-9-]+)\.issuetopr\.dev$;

    # Required when using variables in proxy_pass so names resolve at request time
    resolver 127.0.0.11 ipv6=off valid=5s;

    client_max_body_size 10M;

    # Upstream based on subdomain label, resolved on the Docker "preview" network
    set $upstream http://$preview:3000;

    location / {
        proxy_pass $upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Inject widget script into HTML responses
        proxy_set_header Accept-Encoding "";
        sub_filter '</body>' '<script>try{console.log("[IssueToPR Preview] This site is securely hosted and managed by Issue To PR.");}catch(e){}</script></body>';
        sub_filter_once off;
    }

    # SSE connections need special proxy settings
    location /api/sse {
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
